<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>会議室レイアウター</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100%;
        overscroll-behavior: none;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
          "Noto Sans JP", sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      /* 画像のドラッグ・ゴースト表示を無効化 */
      img {
        -webkit-user-drag: none;
        user-drag: none;
      }
      /* 入力欄では選択・編集を許可 */
      input,
      textarea,
      [contenteditable="true"] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Google H5 Games Ads (AdSense) — ホームに戻る / 評価画面の終了時に
      インタースティシャル広告を表示するために使用。
      AdSenseパブリッシャーID: ca-pub-1081803676733486
      審査通過後、AdSense管理画面で「ゲーム向け広告(H5 Games Ads)」が有効になると配信される。
    -->
    <script
      async
      data-ad-frequency-hint="30s"
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1081803676733486"
      crossorigin="anonymous"
    ></script>
    <script>
      window.adsbygoogle = window.adsbygoogle || [];
      window.adBreak = window.adConfig = function (o) {
        window.adsbygoogle.push(o);
      };
      window.adConfig({ preloadAdBreaks: "on", sound: "on" });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
